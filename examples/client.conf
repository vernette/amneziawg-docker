[Interface]
Address = 10.10.0.2/24
PrivateKey = <CLIENT_PRIVATE_KEY>
# Junk params (Jc/Jmin/Jmax, I1, ...): client-only, need not match the server
Jc = 4
Jmin = 40
Jmax = 70
# Must be identical on the server
S1 = 0
S2 = 0
H1 = 1
H2 = 2
H3 = 3
H4 = 4

[Peer]
PublicKey = <SERVER_PUBLIC_KEY>
Endpoint = your.server.example:51820
# Full-tunnel: route all traffic (needs sysctls net.ipv4.conf.all.src_valid_mark=1 in compose.yaml)
AllowedIPs = 0.0.0.0/0, ::/0
# Split-tunnel: route only the tunnel subnet
# AllowedIPs = 10.10.0.0/24
PersistentKeepalive = 25
